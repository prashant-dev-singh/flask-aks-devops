apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: flask-app
        image: prashantacrdevops01.azurecr.io/flask-aks-app:v1
        ports:
        - containerPort: 5000
